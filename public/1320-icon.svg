    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(80 80) rotate(90) scale(52)">
      <stop offset="0" stop-color="#FFF4C8" stop-opacity="0.7"/>
      <stop offset="0.25" stop-color="#FFD976" stop-opacity="0.42"/>
      <stop offset="0.7" stop-color="#F1B445" stop-opacity="0.14"/>
