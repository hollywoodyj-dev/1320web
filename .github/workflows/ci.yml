name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: QA baseline
        run: npm run qa:baseline

      - name: Content smoke
        run: npm run smoke:content

      - name: Canonical rules smoke
        run: npm run smoke:canonical

      - name: Wisewave result smoke (1977-11-12)
        run: npm run smoke:result-1977

      - name: S5 seed assembly smoke
        run: npm run smoke:s5-assembly

      - name: S6 money frequency smoke
        run: npm run smoke:s6-master

      - name: Production build
        run: npm run build
